<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0b0f" />
    <title>PHONARA</title>
    <style>
      :root { color-scheme: dark; }
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100dvh;
        background: #0b0b0f;
        color: #f2f2f5;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0)
                 env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
        text-align: center;
        gap: 1rem;
      }
      svg { opacity: 0.6; }
      h1 { font-size: 1.25rem; font-weight: 700; }
      p { font-size: 0.875rem; color: #9191a4; max-width: 22rem; line-height: 1.6; }
      button {
        margin-top: 0.5rem;
        padding: 0.625rem 1.5rem;
        border-radius: 0.75rem;
        border: none;
        background: #6366f1;
        color: #fff;
        font-size: 0.875rem;
        font-weight: 600;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <svg width="56" height="56" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="256" cy="256" r="160" stroke="#6366f1" stroke-width="28"/>
      <path d="M182 180 L256 330 L330 180" stroke="#6366f1" stroke-width="28" stroke-linejoin="round" stroke-linecap="round"/>
      <circle cx="256" cy="256" r="24" fill="#6366f1"/>
    </svg>
    <h1 id="title"></h1>
    <p id="body"></p>
    <button id="retry"></button>
    <script>
      // This static fallback ships outside the bundle, so it cannot use the app
      // i18n catalog. It mirrors the app locale resolution: stored preference
      // (phonara.locale) -> browser language -> Korean default. Keep these two
      // strings in sync with the offline copy if the catalog ones change.
      var COPY = {
        ko: {
          title: '네트워크 연결 없음',
          body: '인터넷 연결을 확인하고 다시 시도해 주세요. 연결이 복구되면 자동으로 재연결됩니다.',
          retry: '다시 시도',
          docTitle: 'PHONARA — 오프라인',
        },
        en: {
          title: 'No network connection',
          body: 'Check your internet connection and try again. You will be reconnected automatically once the connection is restored.',
          retry: 'Retry',
          docTitle: 'PHONARA — Offline',
        },
      };
      function resolveLocale() {
        try {
          var stored = window.localStorage.getItem('phonara.locale');
          if (stored === 'ko' || stored === 'en') return stored;
        } catch (e) { /* localStorage may be unavailable */ }
        var nav = (navigator.language || 'ko').toLowerCase();
        return nav.indexOf('en') === 0 ? 'en' : 'ko';
      }
      var locale = resolveLocale();
      var c = COPY[locale];
      document.documentElement.lang = locale;
      document.title = c.docTitle;
      document.getElementById('title').textContent = c.title;
      document.getElementById('body').textContent = c.body;
      document.getElementById('retry').textContent = c.retry;
      document.getElementById('retry').addEventListener('click', function () { location.reload(); });
      window.addEventListener('online', function () { location.reload(); });
    </script>
  </body>
</html>
